<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raptorwings v2</title>
    <link rel="stylesheet" href="../styles/global.css">
</head>
<body>
    <div class="app-shell">
        <nav class="sidebar">
            <div class="logo">
                <h2>Raptorwings</h2>
            </div>
            <ul class="nav-links">
                <li onclick="loadView('mining')" data-i18n="menu.mining">Mining</li>
                <li onclick="loadView('addresses')" data-i18n="menu.addresses">Addresses</li>
                <li onclick="loadView('settings')" data-i18n="menu.settings">Settings</li>
            </ul>
        </nav>

        <main id="main-content">
            <h1>Welcome to Raptorwings v2</h1>
            <p>Select a module from the sidebar to start.</p>
        </main>
    </div>

    <script src="js/i18n.js"></script>
    <script src="js/navigation.js"></script>

    <script>
        window.addEventListener('DOMContentLoaded', async () => {
            const config = await window.api.invoke('get-config');
            
            await window.translatePage(config.language || 'en');
            
            loadView('mining');
        });
    </script>
    
</body>
</html>
