<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #0c0c0c;
            color: white;
            font-family: sans-serif;
            overflow: hidden;
        }

        .logo {
            width: 180px;
            height: auto;
            margin-bottom: 20px;
            animation: fadeIn 1.5s ease-in-out;
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 3px solid #333;
            border-radius: 50%;
            border-top-color: orange;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <img src="../assets/Raptorwings_logo_dark_small.png" class="logo" alt="RaptorWings Logo">
    
    <div class="loader"></div>
    <p style="margin-top: 20px; font-size: 14px; letter-spacing: 2px; color: #aaa;">INITIALIZING...</p>
</body>
</html>
